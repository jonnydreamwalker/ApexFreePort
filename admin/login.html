<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ApexFreePort Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
  <form method="POST" action="/login" class="bg-zinc-900 border border-emerald-900 rounded-2xl p-8 w-full max-w-sm space-y-4">
    <h1 class="text-xl font-bold text-emerald-400 tracking-wide">ApexFreePort</h1>
    <p class="text-zinc-500 text-sm">Inventory bridge admin</p>
    <input type="password" name="password" placeholder="Password" required
      class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none focus:border-emerald-600" />
    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold uppercase text-sm py-3 rounded-xl">Enter</button>
  </form>
</body>
</html>
